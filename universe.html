<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GERLNO 宇宙动画</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:#020212;
  overflow:hidden;
  font-family:sans-serif;
}
#universe{
  display:block;
  width:100vw;
  height:100vh;
}
</style>
</head>
<body>
<canvas id="universe"></canvas>

<script>
const canvas = document.getElementById('universe');
const ctx = canvas.getContext('2d');

// 全屏
function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// --------------------------
// 1. 星星（闪烁+分层）
// --------------------------
class Star {
  constructor(){
    this.reset();
  }
  reset(){
    this.x = Math.random()*canvas.width;
    this.y = Math.random()*canvas.height;
    this.size = Math.random()*1.5+0.2;
    this.alpha = Math.random();
    this.fade = Math.random()*0.01+0.003;
    this.depth = Math.random()*0.5+0.5; // 远近
  }
  update(){
    this.alpha += this.fade;
    if(this.alpha>1 || this.alpha<0.2) this.fade *= -1;
  }
  draw(){
    ctx.globalAlpha = this.alpha;
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.arc(this.x,this.y,this.size*this.depth,0,Math.PI*2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

// --------------------------
// 2. 流星（长尾+随机生成）
// --------------------------
class Meteor {
  constructor(){
    this.reset();
  }
  reset(){
    this.x = Math.random()*canvas.width;
    this.y = 0;
    this.speedX = (Math.random()-0.5)*4;
    this.speedY = Math.random()*6+3;
    this.length = Math.random()*80+40;
    this.opacity = 1;
    this.color = `hsl(${Math.random()*60+180},100%,80%)`;
  }
  update(){
    this.x += this.speedX;
    this.y += this.speedY;
    this.opacity -= 0.01;
  }
  draw(){
    if(this.opacity<=0) return;
    ctx.globalAlpha = this.opacity;
    ctx.strokeStyle = this.color;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(this.x,this.y);
    ctx.lineTo(this.x-this.speedX*this.length,this.y-this.speedY*this.length);
    ctx.stroke();
    ctx.globalAlpha = 1;
  }
}

// --------------------------
// 3. 星云（渐变模糊背景）
// --------------------------
function drawNebula(){
  const gradient = ctx.createRadialGradient(
    canvas.width/2,canvas.height/2,0,
    canvas.width/2,canvas.height/2,Math.max(canvas.width,canvas.height)/1.5
  );
  gradient.addColorStop(0,'rgba(30,0,80,0.3)');
  gradient.addColorStop(0.5,'rgba(10,0,40,0.2)');
  gradient.addColorStop(1,'rgba(2,2,18,0)');
  ctx.fillStyle = gradient;
  ctx.fillRect(0,0,canvas.width,canvas.height);
}

// --------------------------
// 4. 行星（环绕+自转）
// --------------------------
class Planet {
  constructor(orbitRadius,radius,color){
    this.orbit = orbitRadius;
    this.r = radius;
    this.color = color;
    this.angle = Math.random()*Math.PI*2;
    this.speed = (0.2/this.orbit)*0.3;
  }
  update(){
    this.angle += this.speed;
  }
  draw(){
    const cx = canvas.width/2 + Math.cos(this.angle)*this.orbit;
    const cy = canvas.height/2 + Math.sin(this.angle)*this.orbit;
    // 光晕
    const glow = ctx.createRadialGradient(cx,cy,0,cx,cy,this.r*1.5);
    glow.addColorStop(0,this.color);
    glow.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(cx,cy,this.r*1.5,0,Math.PI*2);
    ctx.fill();
    // 星球本体
    ctx.fillStyle = this.color;
    ctx.beginPath();
    ctx.arc(cx,cy,this.r,0,Math.PI*2);
    ctx.fill();
  }
}

// --------------------------
// 5. 点击爆炸粒子
// --------------------------
let burstParticles = [];
canvas.addEventListener('click',(e)=>{
  for(let i=0;i<30;i++){
    burstParticles.push({
      x:e.x, y:e.y,
      vx:(Math.random()-0.5)*6,
      vy:(Math.random()-0.5)*6,
      life:1, color:`hsl(${Math.random()*360},100%,70%)`
    });
  }
});

// --------------------------
// 初始化对象
// --------------------------
const stars = Array.from({length:600},()=>new Star());
const meteors = [];
const planets = [
  new Planet(120,8,'#4fc3f7'),
  new Planet(200,12,'#ff80ab'),
];

// 随机加流星
function addMeteor(){
  if(Math.random()<0.03) meteors.push(new Meteor());
}

// --------------------------
// 主循环
// --------------------------
function animate(){
  // 背景
  ctx.fillStyle = '#020212';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  
  // 星云
  drawNebula();
  
  // 星星
  stars.forEach(s=>{s.update();s.draw();});
  
  // 行星
  planets.forEach(p=>{p.update();p.draw();});
  
  // 流星
  addMeteor();
  meteors.forEach((m,i)=>{
    m.update();
    m.draw();
    if(m.opacity<=0) meteors.splice(i,1);
  });
  
  // 点击爆炸
  burstParticles.forEach((p,i)=>{
    p.x += p.vx; p.y += p.vy;
    p.life -= 0.02;
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x,p.y,2,0,Math.PI*2);
    ctx.fill();
    if(p.life<=0) burstParticles.splice(i,1);
  });
  ctx.globalAlpha = 1;
  
  requestAnimationFrame(animate);
}
animate();
</script>
</body>
</html>
