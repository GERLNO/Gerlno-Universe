<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>模式切换</title>
<style>
  body{
    background:#111; color:#eee;
    font-family: sans-serif;
    text-align: center;
    padding-top: 60px;
  }
  .box{
    max-width: 360px;
    margin: 0 auto;
  }
  a{
    display: block;
    padding: 18px;
    margin: 16px 0;
    background: #222;
    color: #fff;
    text-decoration: none;
    border-radius: 10px;
    font-size: 18px;
    transition: 0.2s;
  }
  a:hover{
    background: #444;
  }
</style>
</head>
<body>
<div class="box">
  <h1>選擇閱讀模式</h1>

  <a href="index.html">原版密集模式</a>
  <a href="catalog.html">舒適閱讀模式</a>
</div>
</body>
</html>
